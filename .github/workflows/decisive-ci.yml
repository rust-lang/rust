name: Decisive Trait CI

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build stage1 compiler & test demos
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc*
          df -h /

      - name: Checkout compiler fork
        uses: actions/checkout@v4
        with:
          path: rust

      - name: Checkout rust-al-demos
        uses: actions/checkout@v4
        with:
          repository: eelstork/rust-al-demos
          path: rust-al-demos

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build python3 curl pkg-config libssl-dev

      - name: Configure compiler build
        working-directory: rust
        run: |
          cat > config.toml << 'TOML'
          profile = "compiler"
          changelog-seen = 2

          [llvm]
          download-ci-llvm = true
          assertions = false

          [rust]
          debug-logging = false
          debug-assertions = false
          incremental = false
          lto = "off"
          download-rustc = false
          TOML

      - name: Cache stage0 and LLVM
        uses: actions/cache@v4
        with:
          path: rust/build/cache
          key: stage0-llvm-${{ hashFiles('rust/src/stage0') }}
          restore-keys: stage0-llvm-

      - name: Build stage1 compiler and stdlib
        working-directory: rust
        run: python3 x.py build library --stage 1

      - name: Register stage1 as rustup toolchain
        run: |
          HOST=$(rustc -vV | grep host | cut -d' ' -f2)
          STAGE1="$(pwd)/rust/build/$HOST/stage1"
          rustup toolchain link decisive-stage1 "$STAGE1"
          rustup run decisive-stage1 rustc --version

      - name: Run compiler tests (decisive trait)
        working-directory: rust
        run: python3 x.py test tests/ui --stage 1 --test-args "decisive"

      - name: Build demos with stage1 compiler
        working-directory: rust-al-demos
        run: cargo +decisive-stage1 check
