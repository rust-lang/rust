name: Kind Schema Drift Check

on:
  push:
    branches:
      - main
    paths:
      - 'tools/kindc/kinds/**'
      - 'tools/kindc/src/**'
      - 'tools/kindc/fixtures/generated/**'
      - 'tools/kindc/Cargo.toml'
  pull_request:
    branches:
      - "**"
    paths:
      - 'tools/kindc/kinds/**'
      - 'tools/kindc/src/**'
      - 'tools/kindc/fixtures/generated/**'
      - 'tools/kindc/Cargo.toml'

permissions:
  contents: read

jobs:
  kindc-drift:
    name: Kind Schema Drift Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Regenerate Kind output
        run: cargo run -p kindc -- tools/kindc/kinds -o tools/kindc/fixtures/generated

      - name: Check for schema drift
        run: |
          if ! git diff --exit-code tools/kindc/fixtures/generated/; then
            echo ""
            echo "ERROR: Generated Kind output is out of date."
            echo "The .kind schema definitions and the checked-in generated Rust code have drifted."
            echo ""
            echo "To fix this, run:"
            echo "  just kindc-gen"
            echo "Then commit the updated files in tools/kindc/fixtures/generated/."
            exit 1
          fi
          echo "Kind schema drift check passed: generated output is up to date."
