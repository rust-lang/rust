[package]
name = "repro-explain"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[dependencies]
anyhow = "1"
camino = { version = "1", features = ["serde1"] }
cargo_metadata = "0.21"
clap = { version = "4", features = ["derive"] }
regex = "1"
rayon = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10.1"
syn = { version = "2", features = ["full", "visit"] }
proc-macro2 = { version = "1", features = ["span-locations"] }
tempfile = "3"
walkdir = "2"
