[package]
authors = ["The Rust Project Developers"]
name = "installer"
version = "0.0.0"
edition = "2021"

[[bin]]
doc = false
name = "rust-installer"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.19"
flate2 = { version = "1.1.9", default-features = false, features = ["zlib-rs"] }
rayon = "1.0"
tar = "0.4.45"
walkdir = "2"
xz2 = "0.1.4"

[dependencies.clap]
features = ["derive"]
version = "4.2"
