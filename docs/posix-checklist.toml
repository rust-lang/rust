version = 1
project = "thingos-posix-checklist"
description = "Machine-checkable POSIX and Rust-hosting coverage tracker for ThingOS"

[meta]
status_enum = ["missing", "partial", "present", "stub", "deferred", "n/a"]
priority_enum = ["p0", "p1", "p2", "p3"]
owner_enum = ["kernel", "libc", "userspace", "mixed"]
category_enum = [
    "process",
    "fd",
    "filesystem",
    "path",
    "memory",
    "time",
    "ipc",
    "signals",
    "terminal",
    "threads",
    "tls",
    "dynamic_loading",
    "network",
    "runtime",
    "misc",
]

# -----------------------------------------------------------------------------
# Milestones
# -----------------------------------------------------------------------------

[[milestones]]
id = "rust_boot"
title = "Rust boots natively"
description = "Enough host substrate for native Rust programs with std to run meaningfully."
required_features = [
    "proc.exec_replace",
    "tls.fs_base_switch",
    "vm.protect",
    "fs.stat_timestamps",
    "time.clock_gettime",
    "time.nanosleep",
    "fd.pipe",
    "fd.poll",
    "path.getcwd",
    "path.chdir",
]

[[milestones]]
id = "cargo_offline"
title = "Cargo works offline"
description = "Enough POSIX-ish behavior for local cargo builds without networking."
required_features = [
    "proc.exec_replace",
    "proc.waitpid",
    "fd.isatty",
    "path.realpath",
    "fd.fcntl_basic",
    "filesystem.fsync",
    "fs.stat_timestamps",
    "fd.pipe",
    "fd.poll",
    "env.getenv",
    "env.setenv",
    "path.getcwd",
    "path.chdir",
]

[[milestones]]
id = "unix_comfortable"
title = "Feels like Unix"
description = "Comfortable compatibility for ordinary CLI and build tooling."
required_features = [
    "signals.eintr",
    "terminal.termios_basic",
    "fs.symlinks",
    "fs.readlink",
    "proc.exec_wrappers",
    "proc.close_on_exec",
    "runtime.auxv_basic",
    "threads.user_threads",
    "threads.futex_basic",
]

# -----------------------------------------------------------------------------
# Features
# -----------------------------------------------------------------------------

# ---- Process / execution -----------------------------------------------------

[[features]]
id = "proc.exec_replace"
title = "In-place process image replacement"
category = "process"
priority = "p0"
status = "missing"
owner = "kernel"
rust_blocker = true
cargo_blocker = true
posix = "execve"
notes = "ThingOS-native fd/handle-based task_exec preferred over path-first execve."

[[features]]
id = "proc.exec_wrappers"
title = "Userspace exec wrappers"
category = "process"
priority = "p2"
status = "missing"
owner = "libc"
rust_blocker = false
cargo_blocker = false
posix = "execv/execve/execvp/fexecve"
notes = "Layer path-based wrappers atop ThingOS-native task_exec(fd, ...)."

[[features]]
id = "proc.close_on_exec"
title = "Close-on-exec descriptor semantics"
category = "process"
priority = "p2"
status = "missing"
owner = "mixed"
rust_blocker = false
cargo_blocker = false
posix = "FD_CLOEXEC"
notes = "Naturally fits with fcntl completion."

[[features]]
id = "proc.waitpid"
title = "Wait for child process exit"
category = "process"
priority = "p1"
status = "partial"
owner = "kernel"
rust_blocker = false
cargo_blocker = true
posix = "waitpid"
notes = "Audit shows parent wait exists via SYS_TASK_WAIT; verify full child-process semantics and nonblocking variants if needed."

[[features]]
id = "proc.fork"
title = "fork semantics"
category = "process"
priority = "p3"
status = "deferred"
owner = "kernel"
rust_blocker = false
cargo_blocker = false
posix = "fork"
notes = "Not required for ThingOS if spawn/task_exec model is strong."

[[features]]
id = "proc.process_groups"
title = "Process groups and sessions"
category = "process"
priority = "p3"
status = "missing"
owner = "kernel"
rust_blocker = false
cargo_blocker = false
posix = "setpgid/setsid"
notes = "Useful later for shells and job control."

