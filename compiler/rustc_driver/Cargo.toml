[package]
name = "rustc_driver"
version = "0.0.0"
edition = "2024"

[lib]
# Allow both dylib (for hosts with dynamic linking support) and rlib (fallback for
# targets like ThingOS where dynamic-linking: false). The bootstrap will select the
# appropriate crate-type based on target capabilities.
crate-type = ["dylib", "rlib"]

[dependencies]
# tidy-alphabetical-start
rustc_driver_impl = { path = "../rustc_driver_impl" }
# tidy-alphabetical-end

[build-dependencies]
# tidy-alphabetical-start
rustc_windows_rc = { path = "../rustc_windows_rc" }
# tidy-alphabetical-end
