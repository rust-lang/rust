[package]
name = "rustc_error_messages"
version = "0.0.0"
edition = "2024"

[dependencies]
# tidy-alphabetical-start
fluent-bundle = {  git = "https://github.com/JonathanBrouwer/fluent-rs.git", branch = "rustc_changes" }
fluent-syntax = {  git = "https://github.com/JonathanBrouwer/fluent-rs.git", branch = "rustc_changes", features = ["serde"] }
icu_list = { version = "2.0", default-features = false, features = ["alloc"] }
icu_locale = { version = "2.0", default-features = false }
intl-memoizer = {  git = "https://github.com/JonathanBrouwer/fluent-rs.git", branch = "rustc_changes" }
postcard = { version = "1.1.3", features = ["alloc"] }
rustc_ast = { path = "../rustc_ast" }
rustc_ast_pretty = { path = "../rustc_ast_pretty" }
rustc_baked_icu_data = { path = "../rustc_baked_icu_data" }
rustc_data_structures = { path = "../rustc_data_structures" }
rustc_macros = { path = "../rustc_macros" }
rustc_serialize = { path = "../rustc_serialize" }
rustc_span = { path = "../rustc_span" }
tracing = "0.1"
unic-langid = { version = "0.9.0", features = ["macros"] }
# tidy-alphabetical-end
