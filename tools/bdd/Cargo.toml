[package]
name = "bdd"
version = "0.1.0"
edition = "2024"

[dependencies]
cucumber = { version = "0.21", features = ["output-json"] }
tokio = { version = "1", features = ["rt-multi-thread", "process", "io-util", "time", "sync", "net"] }
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
futures = "0.3"
chrono = "0.4"
serde_json = "1"
image = "0.25"
rand = "0.8"
regex = "1"

